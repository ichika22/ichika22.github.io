<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>投資メンタル診断 ― あなたは爆発型?中間型?コツコツ型?</title>
<meta name="description" content="5つの質問で、あなたの投資メンタルを診断。爆発型🌿・中間型☀️・コツコツ型🦋、あなたはどのタイプ?">
<meta property="og:title" content="投資メンタル診断 ― あなたはどのタイプ?">
<meta property="og:description" content="5つの質問で、あなたの投資メンタルがわかる。爆発型🌿・中間型☀️・コツコツ型🦋">
<meta property="og:type" content="website">
<meta property="og:url" content="https://ichika22.github.io/shindan/">
<meta property="og:image" content="https://ichika22.github.io/shindan/og_quiz.png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="https://ichika22.github.io/shindan/og_quiz.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600&family=Shippori+Mincho:wght@500;600;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--ink:#221d15;--gold:#c9a34c;--gold2:#e3c87e;--cream:#f2ebda;
  --serif:"Source Serif 4",Georgia,serif;--mincho:"Shippori Mincho",serif;--goth:"Zen Kaku Gothic New",sans-serif}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--goth);background:
  radial-gradient(800px 500px at 50% -10%,rgba(201,163,76,.18),transparent 60%),#14110c;
  color:var(--cream);min-height:100svh;display:flex;flex-direction:column;align-items:center;line-height:1.8}
.wrap{width:100%;max-width:560px;padding:40px 22px 60px;flex:1}
.kicker{font-family:var(--serif);letter-spacing:.4em;font-size:12px;color:var(--gold2);text-align:center;text-transform:uppercase}
h1{font-family:var(--mincho);font-weight:700;font-size:clamp(26px,7vw,34px);text-align:center;margin:14px 0 6px}
.sub{text-align:center;font-size:13.5px;opacity:.8;margin-bottom:34px}
.card{background:rgba(201,163,76,.06);border:1px solid rgba(201,163,76,.35);border-radius:10px;padding:28px 22px}
.qnum{font-family:var(--serif);letter-spacing:.3em;font-size:13px;color:var(--gold);margin-bottom:12px}
.qtext{font-family:var(--mincho);font-weight:600;font-size:19px;margin-bottom:22px;min-height:3.2em}
.opt{display:block;width:100%;text-align:left;background:rgba(242,235,218,.04);color:var(--cream);
  border:1px solid rgba(201,163,76,.4);border-radius:8px;padding:15px 18px;font-size:14.5px;font-family:var(--goth);
  margin-bottom:12px;cursor:pointer;transition:background .2s,transform .15s}
.opt:hover{background:rgba(201,163,76,.16)}
.opt:active{transform:scale(.98)}
.dots{display:flex;gap:8px;justify-content:center;margin-top:22px}
.dot{width:8px;height:8px;border-radius:50%;background:rgba(201,163,76,.25)}
.dot.on{background:var(--gold)}
.fade{animation:fd .35s ease}
@keyframes fd{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
/* result */
.emoji{font-size:64px;text-align:center;line-height:1}
.rtype{font-family:var(--mincho);font-weight:700;font-size:32px;text-align:center;color:var(--gold2);margin:10px 0 2px}
.rsub{font-family:var(--serif);text-align:center;letter-spacing:.25em;font-size:13px;opacity:.75;margin-bottom:20px}
.rdesc{font-size:14.5px;opacity:.92}
.btn{display:block;text-align:center;text-decoration:none;font-weight:700;font-size:15px;letter-spacing:.08em;
  padding:16px 20px;border-radius:8px;margin-top:14px;transition:transform .2s}
.btn:hover{transform:translateY(-2px)}
.btn.gold{background:var(--gold);color:#1c1508;box-shadow:0 6px 24px rgba(201,163,76,.35)}
.btn.line{border:1px solid var(--gold);color:var(--gold2)}
.note{font-size:11px;opacity:.55;text-align:center;margin-top:26px}
.foot{font-family:var(--serif);letter-spacing:.35em;font-size:12px;color:var(--gold);text-align:center;padding:18px 0 26px}
.foot a{color:inherit;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">ESORA</div>
  <h1>投資メンタル診断</h1>
  <p class="sub">5つの質問で、あなたの「増やし方の性格」がわかります🦋</p>

  <div id="stage" class="card fade">
    <div style="text-align:center;padding:10px 0">
      <div style="font-size:44px;margin-bottom:14px">🌿 ☀️ 🦋</div>
      <p style="font-family:var(--mincho);font-size:16px;margin-bottom:8px">爆発型? 中間型? コツコツ型?</p>
      <p style="font-size:13.5px;opacity:.8;margin-bottom:22px">投資のこと、ちょっとだけ自分のこと。<br>直感で答えてください(約30秒)</p>
      <button class="opt" style="text-align:center;background:var(--gold);color:#1c1508;font-weight:700" onclick="start()">診断をはじめる</button>
    </div>
  </div>
  <div class="dots" id="dots" style="display:none"></div>
  <p class="note">※本診断は性格傾向を楽しむエンタメコンテンツであり、投資助言・勧誘ではありません。投資判断はご自身の責任で行ってください。</p>
</div>
<div class="foot"><a href="../">ESORA EA SERIES</a></div>

<script>
'use strict';
const QS = [
  { q:'資産が一時的に半分になりました。正直、どうなりそう?', o:[
    ['ワクワクする。「安く仕込めるチャンス」','L'],
    ['想定の範囲内なら、淡々と続ける','M'],
    ['正直、夜眠れなくなると思う','P']]},
  { q:'旅行のスタイル、どれが近い?', o:[
    ['ノープラン。現地の勢いがいちばん楽しい','L'],
    ['行き先と宿だけ決めて、あとは自由','M'],
    ['分刻みの"しおり"を作り込む','P']]},
  { q:'ジェットコースターは?', o:[
    ['大好き。最前列で手を上げる派','L'],
    ['たまになら楽しい','M'],
    ['下でみんなの荷物を持ってる係','P']]},
  { q:'理想の「資産グラフ」はどれ?', o:[
    ['ギザギザでも、最後に一番高くなる線','L'],
    ['山も谷もあるけど、しっかり右肩上がりの線','M'],
    ['なめらかに、静かに上がり続ける線','P']]},
  { q:'ボーナスが出ました。使い道は?', o:[
    ['欲しかったものを一括で。人生は今','L'],
    ['半分は楽しんで、半分は未来へ','M'],
    ['まず全部貯金。使うのはゆっくり考える','P']]},
];
const score = {L:0,M:0,P:0};
let qi = 0;
const stage = document.getElementById('stage');
const dotsEl = document.getElementById('dots');

function start(){
  dotsEl.style.display = 'flex';
  dotsEl.innerHTML = QS.map((_,i)=>`<div class="dot" id="d${i}"></div>`).join('');
  qi = 0; score.L=0; score.M=0; score.P=0;
  show();
}
function show(){
  QS.forEach((_,i)=>document.getElementById('d'+i).className = 'dot'+(i<=qi?' on':''));
  const q = QS[qi];
  const opts = q.o.map((o,i)=>`<button class="opt" onclick="pick('${o[1]}')">${o[0]}</button>`).join('');
  stage.classList.remove('fade'); void stage.offsetWidth; stage.classList.add('fade');
  stage.innerHTML = `<div class="qnum">Q${qi+1} / ${QS.length}</div><div class="qtext">${q.q}</div>${opts}`;
}
function pick(t){
  score[t]++;
  qi++;
  if(qi < QS.length){ show(); return; }
  // 判定（同点はバランス優先: M > P > L）
  let type = 'M';
  if(score.L > score.M && score.L > score.P) type = 'L';
  else if(score.P > score.M && score.P >= score.L) type = 'P';
  else if(score.M >= score.L && score.M >= score.P) type = 'M';
  const page = {L:'laurel', M:'liora', P:'philia'}[type];
  location.href = page + '.html';
}
</script>
</body>
</html>
